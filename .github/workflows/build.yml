name: Build and SonarQube

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=graduenz_mcp-sqlite-server
            -Dsonar.organization=graduenz
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=src/**/*.test.ts
            -Dsonar.exclusions=dist/**,coverage/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
